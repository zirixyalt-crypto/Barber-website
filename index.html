 
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Barber Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617; 
            color: #ffffff;
            overflow-x: hidden;
            height: 100vh;
            margin: 0;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .hero-shape {
            position: absolute;
            z-index: -1;
            filter: blur(40px);
            opacity: 0.2;
            animation: float 12s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.02); }
        }

        .blue-glow {
            background: radial-gradient(circle, #1d4ed8 0%, transparent 50%);
        }

        #redirectOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(30px);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .progress-container {
            width: 85%;
            max-width: 450px;
            position: relative;
        }

        .progress-label {
            position: absolute;
            top: -30px;
            left: 0;
            font-size: 11px;
            font-weight: 900;
            color: #38bdf8;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .bar-bg {
            width: 100%;
            height: 12px;
            background: #0f172a;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .bar-fill {
            height: 0%;
            width: 0%;
            background: linear-gradient(90deg, #1d4ed8, #38bdf8);
            background-size: 30px 30px;
            background-image: linear-gradient(45deg, rgba(255,255,255,.1) 25%, transparent 25%, transparent 50%, rgba(255,255,255,.1) 50%, rgba(255,255,255,.1) 75%, transparent 75%, transparent);
            border-radius: 20px;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }

        #fallbackContainer {
            margin-top: 50px;
            text-align: center;
            display: none;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .floating-icon {
            position: absolute;
            z-index: 1;
            opacity: 0.12;
            color: #38bdf8;
            animation: slowRotate 30s infinite linear;
            pointer-events: none;
        }

        @keyframes slowRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .btn-blue {
            background: #1d4ed8;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-blue:hover {
            background: #2563eb;
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(29, 78, 216, 0.5);
        }
    </style>
</head>
<body>

    <script>
        const PAGE_CONFIG = {
            headline: "book with me today",
            subheadline: "The highest standard of <strong>Fading & Detail®</strong>",
            trialText: "Available for mobile and in-shop bookings.",
            primaryBtnText: "Book With App",
            secondaryBtnText: "Book With Web",
            appLink: "https://book.thecut.co/Cohen-Cornell-ccn5tn1", 
            webLink: "https://book.thecut.co/Cohen-Cornell-ccn5tn1", 
            stars: 5,
            testimonial: "Better work ethic and cleaner fades than any shop in town.",
        };
    </script>

    <div class="hero-shape blue-glow w-[350px] h-[350px] top-5 left-5"></div>
    <div class="hero-shape blue-glow w-[300px] h-[300px] bottom-5 right-5" style="animation-delay: -3s;"></div>

    <div id="redirectOverlay">
        <div class="progress-container">
            <div class="progress-label">REDIRECTING...</div>
            <div class="bar-bg">
                <div id="barFill" class="bar-fill"></div>
            </div>
        </div>
        <div id="fallbackContainer">
            <p class="text-white text-xl font-bold mb-3">Didn't redirect?</p>
            <a id="manualLink" href="#" target="_blank" class="inline-block bg-white text-black px-6 py-2 rounded-lg font-bold hover:bg-gray-200 transition">Click here to redirect</a>
            <p class="text-blue-400/50 text-xs mt-12 uppercase tracking-widest font-black">If still issues please report to developer</p>
        </div>
    </div>

    <main class="flex flex-col items-center justify-center text-center px-4 pt-32 pb-32 relative z-10">
        <div class="flex flex-col items-center mb-8">
            <div id="starContainer" class="flex gap-1 mb-2 text-yellow-400 text-2xl"></div>
            <p id="testimonialText" class="text-blue-200 text-xs italic tracking-widest uppercase font-bold opacity-80"></p>
        </div>
        <h1 id="mainHeadline" class="text-6xl md:text-9xl font-extrabold tracking-tighter mb-8 max-w-4xl leading-none"></h1>
        <p id="subHeadline" class="text-xl md:text-2xl text-blue-100/60 mb-4 max-w-2xl font-light leading-relaxed"></p>
        <p id="trialText" class="text-blue-300/40 text-sm mb-12"></p>
        <div class="flex flex-col sm:flex-row gap-6">
            <button id="primaryBtn" class="btn-blue text-white px-14 py-5 rounded-full font-black text-xl uppercase tracking-tight"></button>
            <button id="secondaryBtn" class="glass-card text-white px-14 py-5 rounded-full font-black text-xl uppercase tracking-tight hover:bg-white/5 transition"></button>
        </div>
    </main>

    <div class="absolute inset-0 pointer-events-none overflow-hidden">
        <i class="fas fa-scissors floating-icon text-8xl top-[10%] left-[5%]"></i>
        <i class="fas fa-razor floating-icon text-6xl top-[35%] left-[15%]" style="animation-duration: 22s;"></i>
        <i class="fas fa-comb floating-icon text-9xl top-[60%] left-[3%]" style="animation-duration: 18s;"></i>
        <i class="fas fa-spray-can floating-icon text-7xl top-[85%] left-[10%]" style="animation-duration: 28s;"></i>
        <i class="fas fa-chair floating-icon text-9xl top-[15%] right-[10%]" style="opacity: 0.06;"></i>
        <i class="fas fa-brush floating-icon text-7xl top-[40%] right-[15%]" style="opacity: 0.05;"></i>
        <i class="fas fa-user-tie floating-icon text-8xl bottom-[15%] right-[5%]" style="opacity: 0.08;"></i>
    </div>

    <script>
        function initUI() {
            document.getElementById('mainHeadline').innerText = PAGE_CONFIG.headline;
            document.getElementById('subHeadline').innerHTML = PAGE_CONFIG.subheadline;
            document.getElementById('trialText').innerText = PAGE_CONFIG.trialText;
            document.getElementById('primaryBtn').innerText = PAGE_CONFIG.primaryBtnText;
            document.getElementById('secondaryBtn').innerText = PAGE_CONFIG.secondaryBtnText;
            document.getElementById('testimonialText').innerText = `"${PAGE_CONFIG.testimonial}"`;
            const starContainer = document.getElementById('starContainer');
            for(let i=0; i<PAGE_CONFIG.stars; i++) {
                starContainer.innerHTML += '<i class="fas fa-star"></i>';
            }
        }

        function handleRedirect(targetUrl) {
            const overlay = document.getElementById('redirectOverlay');
            const barFill = document.getElementById('barFill');
            const fallback = document.getElementById('fallbackContainer');
            const manualLink = document.getElementById('manualLink');
            overlay.style.display = 'flex';
            manualLink.href = targetUrl || "#";
            let progress = 0;
            function step() {
                let increment = Math.random() * 1.5;
                if (Math.random() > 0.97) increment = 0;
                else if (Math.random() > 0.9) increment = Math.random() * 5;
                progress += increment;
                if (progress > 100) progress = 100;
                barFill.style.width = progress + '%';
                if (progress < 100) {
                    setTimeout(() => requestAnimationFrame(step), Math.random() * 30);
                } else {
                    fallback.style.display = 'block';
                    if (targetUrl && targetUrl.trim() !== "") {
                        const newTab = window.open(targetUrl, '_blank');
                        if (!newTab || newTab.closed || typeof newTab.closed == 'undefined') {
                             console.warn("Popup blocked.");
                        }
                    }
                }
            }
            requestAnimationFrame(step);
        }

        document.getElementById('primaryBtn').onclick = () => handleRedirect(PAGE_CONFIG.appLink);
        document.getElementById('secondaryBtn').onclick = () => handleRedirect(PAGE_CONFIG.webLink);
        window.onload = initUI;
    </script>
</body>
</html>


  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Professional Barber Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617; 
            color: #ffffff;
            overflow-x: hidden;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        .hero-shape {
            position: absolute;
            z-index: -1;
            filter: blur(40px);
            opacity: 0.15;
            animation: float 12s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.05); }
        }

        .blue-glow {
            background: radial-gradient(circle, #1d4ed8 0%, transparent 60%);
        }

        #redirectOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .progress-container {
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        .progress-label {
            margin-bottom: 12px;
            font-size: 12px;
            font-weight: 900;
            color: #38bdf8;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: left;
        }

        .bar-bg {
            width: 100%;
            height: 10px;
            background: #0f172a;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #1d4ed8, #38bdf8);
            border-radius: 20px;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
            transition: width 0.1s ease-out;
        }

        #fallbackContainer {
            margin-top: 40px;
            text-align: center;
            display: none;
            max-width: 300px;
        }

        .floating-icon {
            position: absolute;
            z-index: 1;
            opacity: 0.1;
            color: #38bdf8;
            animation: slowRotate 30s infinite linear;
            pointer-events: none;
        }

        @keyframes slowRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .btn-blue {
            background: #1d4ed8;
            transition: all 0.2s ease;
            touch-action: manipulation;
        }
        
        @media (hover: hover) {
            .btn-blue:hover {
                background: #2563eb;
                transform: translateY(-3px);
                box-shadow: 0 12px 30px rgba(29, 78, 216, 0.5);
            }
        }

        .btn-blue:active {
            transform: scale(0.95);
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <script>
        const PAGE_CONFIG = {
            headline: "book with me today",
            subheadline: "The highest standard of <strong>Fading & Detail®</strong>",
            trialText: "Available for mobile and in-shop bookings.",
            primaryBtnText: "Book With App",
            secondaryBtnText: "Book With Web",
            bookingLink: "https://book.thecut.co/Cohen-Cornell-ccn5tn1", 
            stars: 5,
            testimonial: "Better work ethic and cleaner fades than any shop in town.",
        };
    </script>

    <div class="hero-shape blue-glow w-64 h-64 top-10 left-10"></div>
    <div class="hero-shape blue-glow w-64 h-64 bottom-10 right-10" style="animation-delay: -3s;"></div>

    <div id="redirectOverlay">
        <div class="progress-container">
            <div class="progress-label">Connecting to secure booking...</div>
            <div class="bar-bg">
                <div id="barFill" class="bar-fill"></div>
            </div>
        </div>
        <div id="fallbackContainer">
            <p class="text-white text-lg font-bold mb-4">Didn't redirect?</p>
            <a id="manualLink" href="#" class="inline-block w-full bg-white text-black py-4 rounded-xl font-bold text-center">Click here to redirect</a>
            <p class="text-gray-500 text-[10px] mt-10 uppercase tracking-widest font-bold">If issues persist, report to developer</p>
        </div>
    </div>

    <main class="flex-1 flex flex-col items-center justify-center text-center px-6 py-20 relative z-10">
        <div class="flex flex-col items-center mb-10">
            <div id="starContainer" class="flex gap-1 mb-3 text-yellow-400 text-xl md:text-2xl"></div>
            <p id="testimonialText" class="text-blue-200 text-[10px] md:text-xs italic tracking-widest uppercase font-black opacity-80 max-w-xs"></p>
        </div>

        <h1 id="mainHeadline" class="text-5xl md:text-8xl font-black tracking-tighter mb-6 leading-none uppercase"></h1>
        <p id="subHeadline" class="text-lg md:text-2xl text-blue-100/50 mb-4 max-w-xl font-medium px-4 leading-snug"></p>
        <p id="trialText" class="text-blue-400/40 text-xs mb-12 font-bold"></p>

        <div class="flex flex-col md:flex-row gap-4 w-full max-w-md">
            <button id="primaryBtn" class="btn-blue text-white w-full py-5 rounded-2xl font-black text-lg uppercase tracking-tight shadow-lg"></button>
            <button id="secondaryBtn" class="glass-card text-white w-full py-5 rounded-2xl font-black text-lg uppercase tracking-tight"></button>
        </div>
    </main>

    <div class="absolute inset-0 pointer-events-none overflow-hidden">
        <i class="fas fa-scissors floating-icon text-7xl top-[15%] left-[8%]"></i>
        <i class="fas fa-razor floating-icon text-5xl top-[40%] left-[18%]"></i>
        <i class="fas fa-comb floating-icon text-8xl top-[70%] left-[5%]"></i>
        <i class="fas fa-chair floating-icon text-7xl top-[20%] right-[12%]"></i>
        <i class="fas fa-spray-can floating-icon text-6xl top-[50%] right-[5%]"></i>
    </div>

    <script>
        function initUI() {
            document.getElementById('mainHeadline').innerText = PAGE_CONFIG.headline;
            document.getElementById('subHeadline').innerHTML = PAGE_CONFIG.subheadline;
            document.getElementById('trialText').innerText = PAGE_CONFIG.trialText;
            document.getElementById('primaryBtn').innerText = PAGE_CONFIG.primaryBtnText;
            document.getElementById('secondaryBtn').innerText = PAGE_CONFIG.secondaryBtnText;
            document.getElementById('testimonialText').innerText = `"${PAGE_CONFIG.testimonial}"`;
            
            const stars = document.getElementById('starContainer');
            for(let i=0; i<PAGE_CONFIG.stars; i++) {
                stars.innerHTML += '<i class="fas fa-star"></i>';
            }
        }

        function triggerRedirect() {
            const url = PAGE_CONFIG.bookingLink;
            const overlay = document.getElementById('redirectOverlay');
            const bar = document.getElementById('barFill');
            const fallback = document.getElementById('fallbackContainer');
            const link = document.getElementById('manualLink');

            overlay.style.display = 'flex';
            link.href = url;
            
            let progress = 0;
            
            function animate() {
                // Stuttering speed logic
                let inc = Math.random() * 1.8;
                if (Math.random() > 0.96) inc = 0; 
                if (Math.random() > 0.92) inc = Math.random() * 7; 

                progress += inc;
                if (progress > 100) progress = 100;
                
                bar.style.width = progress + '%';

                if (progress < 100) {
                    setTimeout(() => requestAnimationFrame(animate), Math.random() * 35);
                } else {
                    // ON COMPLETION:
                    // Show the backup button first
                    fallback.style.display = 'block';
                    
                    // Critical Fix: window.location.replace works better for "auto" redirect
                    // as browsers allow it more easily than window.open inside a timer.
                    setTimeout(() => {
                        window.location.replace(url);
                    }, 400);
                }
            }
            requestAnimationFrame(animate);
        }

        document.getElementById('primaryBtn').addEventListener('click', triggerRedirect);
        document.getElementById('secondaryBtn').addEventListener('click', triggerRedirect);

        window.onload = initUI;
    </script>
</body>
</html>
